{% extends "registration/auth_base.html" %}
{% block title %}Sign In — Kommies{% endblock %}

{% block card %}
<div class="auth-icon">👋</div>
<div class="auth-title">Welcome back</div>
<p class="auth-sub">Sign in to your Kommies account.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-auth btn-auth-primary" style="margin-top:8px;">Sign in</button>
</form>

<div class="auth-divider"></div>
<div style="text-align:center;font-size:13px;color:#807b74;">
    Forgot your password?
    <a href="{% url 'password_reset' %}" style="color:#e8673a;font-weight:500;">Reset it</a>
</div>
{% endblock %}
