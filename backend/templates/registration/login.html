{% extends "base.html" %}
{% block title %}Log In - Comment Platform{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 card p-8">
    <div class="text-center mb-8">
        <span class="text-4xl">👋</span>
        <h2 class="text-2xl font-bold text-gray-900 mt-4">Welcome back</h2>
        <p class="text-sm text-gray-500 mt-2">Please enter your details to sign in.</p>
    </div>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="pt-2">
            <button type="submit" class="btn-primary w-full">Log in</button>
        </div>
    </form>

    <div class="mt-6 text-center">
        <p class="text-sm text-gray-600">
            Forgot your password?
            <a href="{% url 'password_reset' %}"
                class="font-medium text-indigo-600 hover:text-indigo-500 transition">Reset it here</a>
        </p>
    </div>
</div>
{% endblock %}
