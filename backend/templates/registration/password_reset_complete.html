{% extends "base.html" %}
{% block title %}Password Reset Complete - Comment Platform{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 card p-8 text-center">
    <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-4">
        <i class="fas fa-check-circle text-green-600 text-xl"></i>
    </div>
    <h2 class="text-2xl font-bold text-gray-900">Password Reset Complete</h2>
    <p class="text-sm text-gray-500 mt-2 mb-6">Your password has been set. You may go ahead and log in now.</p>
    <a href="{% url 'login' %}" class="btn-primary w-full">Log in</a>
</div>
{% endblock %}
