{% extends "registration/auth_base.html" %}
{% block title %}Change Password — Kommies{% endblock %}

{% block card %}
<div class="auth-icon">
    <i class="fas fa-shield-alt" style="color:#e8673a;font-size:18px;"></i>
</div>
<div class="auth-title">Change password</div>
<p class="auth-sub">Update your security credentials.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-auth btn-auth-primary" style="margin-top:8px;">Update password</button>
</form>

<div class="auth-divider"></div>
<div style="text-align:center;">
    <a href="{% url 'dashboard:home' %}" style="font-size:13px;color:#807b74;">
        <i class="fas fa-arrow-left" style="margin-right:5px;font-size:11px;"></i>Back to dashboard
    </a>
</div>
{% endblock %}
