{% extends "registration/auth_base.html" %}
{% block title %}Reset Password — Kommies{% endblock %}

{% block card %}
<div class="auth-icon">
    <i class="fas fa-key" style="color:#e8673a;font-size:18px;"></i>
</div>
<div class="auth-title">Reset your password</div>
<p class="auth-sub">Enter your email and we'll send you a reset link.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-auth btn-auth-primary" style="margin-top:8px;">Send reset link</button>
</form>

<div class="auth-divider"></div>
<div style="text-align:center;">
    <a href="{% url 'login' %}" style="font-size:13px;color:#807b74;">
        <i class="fas fa-arrow-left" style="margin-right:5px;font-size:11px;"></i>Back to sign in
    </a>
</div>
{% endblock %}
