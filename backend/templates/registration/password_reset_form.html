{% extends "base.html" %}
{% block title %}Reset Password - Comment Platform{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 card p-8">
    <div class="text-center mb-8">
        <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-indigo-100 mb-4">
            <i class="fas fa-key text-indigo-600 text-xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-900">Reset Password</h2>
        <p class="text-sm text-gray-500 mt-2">Enter your email address and we'll send you a link to reset your password.
        </p>
    </div>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="pt-2">
            <button type="submit" class="btn-primary w-full">Send Reset Link</button>
        </div>
    </form>

    <div class="mt-6 text-center">
        <a href="{% url 'login' %}" class="text-sm font-medium text-gray-600 hover:text-gray-900 transition">Back to
            login</a>
    </div>
</div>
{% endblock %}
