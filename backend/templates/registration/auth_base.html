<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Kommies{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: 'IBM Plex Sans', system-ui, sans-serif;
            font-size: 14px;
            background: #f4f3f0;
            color: #1a1917;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button {
            cursor: pointer;
            font: inherit;
            border: none;
            background: none;
        }

        .auth-wrap {
            width: 100%;
            max-width: 400px;
        }

        .auth-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 9px;
            margin-bottom: 28px;
        }

        .auth-brand-mark {
            width: 30px;
            height: 30px;
            background: #e8673a;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 16px;
            color: #fff;
        }

        .auth-brand-name {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 18px;
            color: #1a1917;
            letter-spacing: -.2px;
        }

        .auth-card {
            background: #fff;
            border: 1px solid #e2deda;
            border-radius: 12px;
            padding: 36px 32px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, .06);
        }

        .auth-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #fdf0ea;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 20px;
        }

        .auth-icon.success {
            background: #eaf4ee;
        }

        .auth-icon.info {
            background: #e6f2fb;
        }

        .auth-title {
            font-family: 'Syne', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: #1a1917;
            letter-spacing: -.3px;
            text-align: center;
            margin-bottom: 6px;
        }

        .auth-sub {
            font-size: 13px;
            color: #807b74;
            text-align: center;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .auth-card label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #1a1917;
            margin-bottom: 5px;
        }

        .auth-card input[type="text"],
        .auth-card input[type="email"],
        .auth-card input[type="password"] {
            display: block;
            width: 100%;
            padding: 9px 12px;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 13px;
            color: #1a1917;
            background: #fff;
            border: 1px solid #e2deda;
            border-radius: 6px;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }

        .auth-card input:focus {
            border-color: #e8673a;
            box-shadow: 0 0 0 3px rgba(232, 103, 58, .12);
        }

        .auth-card form p {
            margin-bottom: 14px;
        }

        .auth-card .helptext {
            font-size: 11px;
            color: #807b74;
            margin-top: 4px;
            display: block;
        }

        .auth-card ul.errorlist {
            font-size: 12px;
            color: #b83232;
            margin-top: 4px;
            list-style: none;
        }

        .btn-auth {
            display: block;
            width: 100%;
            padding: 10px 16px;
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            border-radius: 6px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: background .15s, border-color .15s;
        }

        .btn-auth-primary {
            background: #e8673a;
            color: #fff;
            border-color: #e8673a;
        }

        .btn-auth-primary:hover {
            background: #d45830;
            border-color: #d45830;
        }

        .btn-auth-ghost {
            background: transparent;
            color: #4a4640;
            border-color: #e2deda;
        }

        .btn-auth-ghost:hover {
            background: #f4f3f0;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #807b74;
        }

        .auth-footer a {
            color: #e8673a;
            font-weight: 500;
        }

        .auth-footer a:hover {
            color: #d45830;
        }

        .auth-divider {
            height: 1px;
            background: #e2deda;
            margin: 20px 0;
        }
    </style>
</head>

<body>
    <div class="auth-wrap">
        <div class="auth-brand">
            <div class="auth-brand-mark">K</div>
            <span class="auth-brand-name">Kommies</span>
        </div>
        <div class="auth-card">
            {% block card %}{% endblock %}
        </div>
        {% block footer %}{% endblock %}
    </div>
</body>

</html>
