{% extends "registration/auth_base.html" %}
{% block title %}Set New Password — Kommies{% endblock %}

{% block card %}
<div class="auth-icon">
    <i class="fas fa-lock" style="color:#e8673a;font-size:18px;"></i>
</div>
<div class="auth-title">Set new password</div>
<p class="auth-sub">Choose a strong password for your account.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn-auth btn-auth-primary" style="margin-top:8px;">Save new password</button>
</form>
{% endblock %}
