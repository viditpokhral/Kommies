{% extends "base.html" %}
{% block title %}Set New Password - Comment Platform{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-10 card p-8">
    <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-gray-900">Set New Password</h2>
        <p class="text-sm text-gray-500 mt-2">Please enter your new password below.</p>
    </div>

    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="pt-2">
            <button type="submit" class="btn-primary w-full">Save New Password</button>
        </div>
    </form>
</div>
{% endblock %}
