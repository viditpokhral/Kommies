{% extends "registration/auth_base.html" %}
{% block title %}Check Your Inbox — Kommies{% endblock %}

{% block card %}
<div class="auth-icon info">
    <i class="fas fa-envelope" style="color:#1a67a0;font-size:18px;"></i>
</div>
<div class="auth-title">Check your inbox</div>
<p class="auth-sub">We've emailed instructions for resetting your password. If an account exists with that email, you'll
    receive them shortly.</p>
<a href="{% url 'login' %}" class="btn-auth btn-auth-ghost">Return to sign in</a>
{% endblock %}
