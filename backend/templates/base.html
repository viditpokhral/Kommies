<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Comment Platform{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', system-ui, sans-serif;
        }

        .card {
            @apply bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden;
        }

        .badge {
            @apply inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium;
        }

        .badge-green {
            @apply bg-green-100 text-green-800;
        }

        .badge-yellow {
            @apply bg-yellow-100 text-yellow-800;
        }

        .badge-red {
            @apply bg-red-100 text-red-800;
        }

        .badge-blue {
            @apply bg-blue-100 text-blue-800;
        }

        /* Django Form Global Styles */
        form p {
            @apply mb-4;
        }

        form label {
            @apply block text-sm font-medium text-gray-700 mb-1.5;
        }

        form input[type="text"],
        form input[type="email"],
        form input[type="password"] {
            @apply block w-full rounded-lg border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-4 py-2 border transition duration-150 ease-in-out;
        }

        form .helptext {
            @apply text-xs text-gray-500 mt-1 block;
        }

        form ul.errorlist {
            @apply text-sm text-red-600 mt-1 list-none p-0;
        }

        /* Buttons */
        .btn-primary {
            @apply flex justify-center py-2 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out;
        }

        .btn-secondary {
            @apply flex justify-center py-2 px-4 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition duration-150 ease-in-out;
        }
    </style>
</head>

<body class="bg-gray-50 flex flex-col min-h-screen">
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0 flex items-center">
                        <span class="text-2xl">💬</span>
                        <span class="ml-2 text-xl font-bold text-gray-900 tracking-tight">Comment Platform</span>
                    </div>
                    <div class="hidden sm:ml-8 sm:flex sm:space-x-8 h-full">
                        <a href="{% url 'dashboard:home' %}"
                            class="border-indigo-500 text-gray-900 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition">
                            Dashboard
                        </a>
                        <a href="/admin/"
                            class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition">
                            Admin
                        </a>
                    </div>
                </div>
                <div class="flex items-center space-x-4">
                    {% if user.is_authenticated %}
                    <span class="text-sm font-medium text-gray-700 hidden sm:block">{{ user.email }}</span>
                    <a href="/admin/logout/" class="text-sm text-gray-500 hover:text-red-600 transition">Logout</a>
                    {% else %}
                    <a href="/admin/login/"
                        class="text-sm font-medium text-indigo-600 hover:text-indigo-700 transition">Login</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <p class="text-center text-sm text-gray-500">
                © 2025 Comment Platform. Powered by Django + FastAPI.
            </p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>

</html>
